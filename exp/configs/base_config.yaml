general:
  random_seed: 42
  training_method: 'dqn'
  save_path: '.'

env:
  type: 'AlfredTWEnv'
  regen_game_files: False
  
  domain_file: '${ALFWORLD_DATA:-~/.cache/alfworld}/logic/alfred.pddl'
  grammar_path: '${ALFWORLD_DATA:-~/.cache/alfworld}/logic/alfred.twl2'
  
  expert_timeout_steps: 150
  goal_desc_human_anns_prob: 0.0
  task_types: [1, 2, 3, 4, 5, 6]
  domain_randomization: False
  expert_type: "handcoded"
  
  hypertree_cfg:
    data_path: '${ALFWORLD_DATA:-~/.cache/alfworld}'

dataset:
  data_path: '${ALFWORLD_DATA:-~/.cache/alfworld}/json_2.1.1/train'
  eval_id_data_path: '${ALFWORLD_DATA:-~/.cache/alfworld}/json_2.1.1/valid_seen'
  eval_ood_data_path: '${ALFWORLD_DATA:-~/.cache/alfworld}/json_2.1.1/valid_unseen'
  
  num_train_games: -1
  num_eval_games: -1

rl:
  training:
    max_nb_steps_per_episode: 50
  evaluation:
    max_nb_steps_per_episode: 50
